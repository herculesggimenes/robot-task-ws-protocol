<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Task WS Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191d21;
      --panel-2: #20262b;
      --line: #323a42;
      --text: #eef2f4;
      --muted: #9da8b2;
      --blue: #6fb7ff;
      --green: #5fd18b;
      --yellow: #f0c45c;
      --red: #ff6b6b;
      --violet: #c29cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #15181b;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
    .urls {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr)) auto;
      gap: 8px;
      width: min(100%, 980px);
    }
    input, button {
      height: 34px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 0 10px;
      min-width: 0;
    }
    button {
      background: #26313a;
      cursor: pointer;
      white-space: nowrap;
    }
    main {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 16px;
      padding: 16px;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      min-width: 0;
    }
    section h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      color: #d7dde2;
      letter-spacing: 0;
    }
    .stack { display: grid; gap: 16px; align-content: start; }
    .content { padding: 12px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 10px; }
    .key { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }
    .ok { color: var(--green); }
    .warn { color: var(--yellow); }
    .bad { color: var(--red); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .list { display: grid; gap: 8px; }
    .row {
      padding: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 6px;
      min-width: 0;
    }
    .row-title { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .images { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    figure { margin: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #0d0f11; }
    img { display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: contain; background: #08090a; }
    figcaption { display: flex; justify-content: space-between; padding: 8px; color: var(--muted); font-size: 12px; }
    pre {
      margin: 0;
      padding: 10px;
      overflow: auto;
      max-height: 300px;
      background: #0d0f11;
      border-top: 1px solid var(--line);
      color: #ccd4db;
    }
    @media (max-width: 980px) {
      header { grid-template-columns: 1fr; }
      .urls { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Robot Task WS Viewer</h1>
    <div class="urls">
      <input id="protocolUrl" value="ws://127.0.0.1:8765" aria-label="Protocol WebSocket URL">
      <input id="controlUrl" value="ws://127.0.0.1:8780/control" aria-label="Legacy control WebSocket URL">
      <input id="cameraUrl" value="ws://127.0.0.1:8770/cameras" aria-label="Legacy camera WebSocket URL">
      <button id="connect">Connect</button>
    </div>
  </header>
  <main>
    <div class="stack">
      <section>
        <h2>Connections</h2>
        <div class="content kv">
          <div class="key">Protocol</div><div id="protocolStatus" class="pill">idle</div>
          <div class="key">Control</div><div id="controlStatus" class="pill">idle</div>
          <div class="key">Cameras</div><div id="cameraStatus" class="pill">idle</div>
        </div>
      </section>
      <section>
        <h2>Coordinator</h2>
        <div id="coordinator" class="content list"></div>
      </section>
      <section>
        <h2>Tasks</h2>
        <div id="tasks" class="content list"></div>
      </section>
      <section>
        <h2>Shared Resources</h2>
        <div id="resources" class="content list"></div>
      </section>
    </div>
    <div class="stack">
      <div class="grid">
        <section>
          <h2>Robot State</h2>
          <div id="robots" class="content list"></div>
        </section>
        <section>
          <h2>Leader Arms</h2>
          <div id="leaders" class="content list"></div>
        </section>
      </div>
      <section>
        <h2>Camera Frames</h2>
        <div id="images" class="content images"></div>
      </section>
      <section>
        <h2>Event Log</h2>
        <pre id="log" class="mono"></pre>
      </section>
    </div>
  </main>
  <script>
    const state = {
      sockets: [],
      reports: new Map(),
      robots: new Map(),
      leaders: new Map(),
      images: new Map(),
      resources: new Map(),
      tasks: new Map(),
      events: []
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(id, text, cls) {
      const el = $(id);
      el.textContent = text;
      el.className = `pill ${cls || ""}`;
    }

    function log(message, payload) {
      state.events.unshift({ t: new Date().toLocaleTimeString(), message, payload });
      state.events = state.events.slice(0, 80);
      $("log").textContent = state.events
        .map((event) => `[${event.t}] ${event.message}\n${JSON.stringify(event.payload, null, 2)}`)
        .join("\n\n");
    }

    function compactArray(values, max = 7) {
      if (!Array.isArray(values)) return "";
      const shown = values.slice(0, max).map((value) => Number(value).toFixed(3));
      return `${shown.join(", ")}${values.length > max ? " ..." : ""}`;
    }

    function row(title, body, badge) {
      return `<div class="row"><div class="row-title"><strong>${title}</strong>${badge || ""}</div>${body}</div>`;
    }

    function render() {
      $("coordinator").innerHTML = [...state.reports.values()].map((report) => {
        const statusClass = report.status === "ok" ? "ok" : report.status === "error" ? "bad" : "warn";
        return row(
          report.component_id,
          `<div class="mono">${JSON.stringify(report.details || {}, null, 2)}</div>`,
          `<span class="pill ${statusClass}">${report.status}</span>`
        );
      }).join("") || `<span class="pill">no status reports</span>`;

      $("tasks").innerHTML = [...state.tasks.values()].map((task) => {
        const title = task.id || task.task_id || "task";
        const kind = task.task?.kind || task.type;
        return row(title, `<div>${kind}</div><div class="mono">${JSON.stringify(task, null, 2)}</div>`);
      }).join("") || `<span class="pill">no tasks</span>`;

      $("resources").innerHTML = [...state.resources.values()].map((resource) => row(
        resource.resource_id,
        `<div class="kv"><div class="key">Revision</div><div>${resource.revision}</div><div class="key">Package</div><div>${resource.package_id || resource.last_package_id || ""}</div></div><div class="mono">${JSON.stringify(resource.state || {}, null, 2)}</div>`
      )).join("") || `<span class="pill">no shared resources</span>`;

      $("robots").innerHTML = [...state.robots.values()].map((robot) => row(
        robot.robot_id,
        `<div class="kv"><div class="key">Space</div><div>${robot.state_space || ""}</div><div class="key">Joints</div><div class="mono">${compactArray(robot.joint_pos, 14)}</div></div>`
      )).join("") || `<span class="pill">no robot state</span>`;

      $("leaders").innerHTML = [...state.leaders.values()].map((leader) => row(
        leader.leader_id,
        `<div class="kv"><div class="key">Kind</div><div>${leader.kind}</div><div class="key">Arm</div><div>${leader.target_arm || ""}</div><div class="key">Raw</div><div class="mono">${compactArray(leader.raw, 6)}</div><div class="key">Executing</div><div>${leader.executing ? "yes" : "no"}</div></div>`,
        `<span class="pill ${leader.synchronized ? "ok" : "warn"}">${leader.synchronized ? "sync" : "unsynced"}</span>`
      )).join("") || `<span class="pill">no leader state</span>`;

      $("images").innerHTML = [...state.images.values()].map((frame) => `
        <figure>
          <img src="data:${frame.content_type || "image/jpeg"};base64,${frame.data}" alt="${frame.camera_id}">
          <figcaption><span>${frame.camera_id}</span><span>${frameAge(frame)}</span></figcaption>
        </figure>
      `).join("") || `<span class="pill">no frames</span>`;
    }

    function frameAge(frame) {
      const t = frame.captured_at || frame.timestamp;
      if (!t) return "";
      return `${Math.max(0, Date.now() / 1000 - t).toFixed(1)}s`;
    }

    function handleProtocol(message) {
      if (message.type === "status.report") {
        state.reports.set(message.component_id || "unknown", message);
        const latest = message.details?.latest || [];
        latest.forEach(handleProtocol);
        Object.entries(message.details?.resources || {}).forEach(([resource_id, resource]) => {
          state.resources.set(resource_id, { resource_id, ...resource });
        });
      } else if (message.type === "robot.state") {
        state.robots.set(message.robot_id || "unknown", message);
      } else if (message.type === "leader.state") {
        state.leaders.set(message.leader_id || "unknown", message);
      } else if (message.type === "image.frame") {
        state.images.set(message.camera_id || "camera", message);
      } else if (["task.request", "task.claim", "task.result"].includes(message.type)) {
        state.tasks.set(message.id || message.task_id || `${message.type}-${Date.now()}`, message);
      } else if (message.type === "state.accepted") {
        state.resources.set(message.resource_id, message);
      }
      render();
    }

    function connectProtocol(url) {
      const ws = new WebSocket(url);
      state.sockets.push(ws);
      setStatus("protocolStatus", "connecting", "warn");
      ws.onopen = () => {
        setStatus("protocolStatus", "connected", "ok");
        ws.send(JSON.stringify({
          type: "client.register",
          protocol: "robot-task-ws",
          version: "0.1.0",
          client_id: `viewer-${Math.random().toString(16).slice(2)}`,
          role: "monitor",
          capabilities: ["status.view"]
        }));
      };
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        handleProtocol(message);
        if (message.type !== "image.frame") log(`protocol ${message.type}`, message);
      };
      ws.onclose = () => setStatus("protocolStatus", "closed", "bad");
      ws.onerror = () => setStatus("protocolStatus", "error", "bad");
    }

    function rpc(ws, method, params = {}) {
      const id = `${method}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      ws.send(JSON.stringify({ id, method, params }));
      return id;
    }

    function connectControl(url) {
      const ws = new WebSocket(url);
      const pending = new Map();
      state.sockets.push(ws);
      setStatus("controlStatus", "connecting", "warn");
      ws.onopen = () => {
        setStatus("controlStatus", "connected", "ok");
        setInterval(() => {
          if (ws.readyState !== WebSocket.OPEN) return;
          pending.set(rpc(ws, "get_status"), "status");
          pending.set(rpc(ws, "get_joint_pos"), "joints");
        }, 500);
      };
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "hello") {
          log("legacy control hello", message);
          return;
        }
        const kind = pending.get(message.id);
        pending.delete(message.id);
        if (kind === "status") {
          state.reports.set("legacy-yam-control", {
            component_id: "legacy-yam-control",
            status: message.ok ? "ok" : "error",
            details: message.result || message.error
          });
        }
        if (kind === "joints" && message.ok) {
          state.robots.set("legacy-yam", {
            robot_id: "legacy-yam",
            state_space: "yam_bimanual_14d",
            joint_pos: message.result
          });
        }
        render();
      };
      ws.onclose = () => setStatus("controlStatus", "closed", "bad");
      ws.onerror = () => setStatus("controlStatus", "error", "bad");
    }

    function connectCamera(url) {
      const ws = new WebSocket(url);
      state.sockets.push(ws);
      setStatus("cameraStatus", "connecting", "warn");
      ws.onopen = () => {
        setStatus("cameraStatus", "connected", "ok");
        ws.send(JSON.stringify({ type: "subscribe", fps: 3, cameras: "all", bundle: true }));
      };
      ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "hello" || message.type === "subscribed") {
          log(`legacy camera ${message.type}`, message);
          return;
        }
        const frames = message.type === "frames" ? message.frames || [] : [message];
        frames.filter((frame) => frame.type === "frame").forEach((frame) => {
          state.images.set(`legacy:${frame.camera_id}`, frame);
        });
        render();
      };
      ws.onclose = () => setStatus("cameraStatus", "closed", "bad");
      ws.onerror = () => setStatus("cameraStatus", "error", "bad");
    }

    function connectAll() {
      state.sockets.forEach((socket) => socket.close());
      state.sockets = [];
      connectProtocol($("protocolUrl").value);
      connectControl($("controlUrl").value);
      connectCamera($("cameraUrl").value);
    }

    $("connect").addEventListener("click", connectAll);
    render();
  </script>
</body>
</html>
